name: awesome_memo
description: "Awesome Memo — a messenger-style memo app with LLM auto-classification and per-kind room templates."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.1.0

  # Immutable models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local-first persistence
  drift: ^2.28.0
  drift_flutter: ^0.2.6
  path_provider: ^2.1.5
  path: ^1.9.1

  # Firebase AI Logic (Gemini)
  firebase_core: ^4.1.1
  firebase_ai: ^3.12.2

  # Settings persistence
  shared_preferences: ^2.5.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  collection: ^1.19.1
  share_handler: ^0.0.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  freezed: ^3.2.0
  json_serializable: ^6.9.5
  drift_dev: ^2.28.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

# App launcher icons — run: dart run flutter_launcher_icons
# Source: a 1024x1024 PNG at assets/icon/app_icon.png (design it with the app-icon skill).
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  # Android adaptive icon (foreground PNG on a solid brand background).
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# Native splash screen — run: dart run flutter_native_splash:create
# Source logo at assets/icon/splash_logo.png (centered on the brand background).
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash_logo.png
  color_dark: "#0E0E10"
  image_dark: assets/icon/splash_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/icon/splash_logo.png
    color: "#FFFFFF"
    image_dark: assets/icon/splash_logo.png
    color_dark: "#0E0E10"
